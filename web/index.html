<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Satoshi Valley</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; image-rendering: crisp-edges; cursor: crosshair; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// Top-level error trap — catches anything that explodes during script load
// before our own in-loop handler can run. Paints directly to the canvas so
// mobile users never see a pure-black screen with no explanation.
(function(){
  window.__svErrors = [];
  function repaint(){
    try {
      var c = document.getElementById('game');
      if (!c.width || !c.height) { c.width = window.innerWidth||800; c.height = window.innerHeight||600; }
      var x = c.getContext('2d');
      x.fillStyle = '#300'; x.fillRect(0,0,c.width,c.height);
      x.fillStyle = '#fff'; x.font = 'bold 12px monospace'; x.textBaseline = 'top';
      x.fillText('LOAD ERRORS (showing first '+Math.min(window.__svErrors.length,4)+' of '+window.__svErrors.length+'):', 8, 6);
      for (var i = 0; i < window.__svErrors.length && i < 4; i++){
        var e = window.__svErrors[i];
        var y = 28 + i * 50;
        x.fillStyle = '#ff8'; x.fillText('#'+(i+1)+' '+(e.src?e.src.split('/').pop():'?')+':'+(e.line||'?')+':'+(e.col||'?'), 8, y);
        x.fillStyle = '#fff'; x.fillText(String(e.msg).slice(0, 70), 8, y + 16);
        if (e.stack) { x.fillStyle = '#bbb'; x.fillText(String(e.stack).slice(0, 70), 8, y + 32); }
      }
      x.fillStyle = '#aaf';
      x.fillText('canvas='+c.width+'x'+c.height+' iw='+window.innerWidth+' ih='+window.innerHeight, 8, 240);
      x.fillText('ua='+navigator.userAgent.slice(0,70), 8, 256);
    } catch(e){}
  }
  window.addEventListener('error', function(ev){
    window.__svErrors.push({msg: ev.message || 'unknown', src: ev.filename, line: ev.lineno, col: ev.colno, stack: ev.error && ev.error.stack});
    repaint();
  });
  window.addEventListener('unhandledrejection', function(ev){
    window.__svErrors.push({msg: 'unhandled: '+(ev.reason&&ev.reason.message||ev.reason), src: '', line: 0, col: 0});
    repaint();
  });
})();
</script>
<!--
  Script load order matters (Sprint 17 modularization).
  - game_audio / game_quests / game_mines load BEFORE game.js: they
    declare shared state (sfx, NPC_QUESTS, mineFloor, MINE_ENEMIES, …)
    with no top-level references back into game.js.
  - game_render loads AFTER game.js because its top-level
    TERRAIN_GRASS/TERRAIN_WATER_SET const initializers reference T
    (tile enum declared in game.js). All render functions are only
    invoked from inside gameLoop/draw at runtime — after this script
    has executed — so the forward reference is safe.
-->
<script src="sprites.js?v=29"></script>
<script src="music.js?v=29"></script>
<script src="game_audio.js?v=29"></script>
<script src="game_quests.js?v=29"></script>
<script src="game_mines.js?v=29"></script>
<script src="game.js?v=29"></script>
<script src="game_render.js?v=29"></script>
</body>
</html>
