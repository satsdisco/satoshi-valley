<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satoshi Valley</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #0a0a0a; 
  display: flex; 
  flex-direction: column;
  align-items: center; 
  justify-content: center; 
  height: 100vh; 
  font-family: 'Courier New', monospace;
  color: #F7931A;
  overflow: hidden;
}
canvas { 
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  display: block;
}
#info {
  position: fixed;
  bottom: 8px;
  font-size: 11px;
  color: #555;
  text-align: center;
  pointer-events: none;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="info">WASD: Move | E: Interact | R: Use Item | B: Shop | I: Inventory | P: Save | L: Load | Space: Fast Forward | F: Fullscreen</div>
<script src="game.js"></script>
</body>
</html>
